name = "autter-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "none"

[vars]
BETTER_AUTH_URL = "http://localhost:8787"

# Wrangler does not bind the parent shell's env to the Worker unless you use
# `.dev.vars` / `.env` or set CLOUDFLARE_INCLUDE_PROCESS_ENV (see `npm run dev`).
# If `packages/api/.dev.vars` exists, that file wins and process env is not merged.

# Secrets are set via `wrangler secret put` or Doppler integration:
# - BETTER_AUTH_SECRET
# - DATABASE_URL
# - GITHUB_CLIENT_ID
# - GITHUB_CLIENT_SECRET
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# - RESEND_API_KEY
# - VALID_CLIENT_IDS
